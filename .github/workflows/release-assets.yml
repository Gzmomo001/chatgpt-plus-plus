name: Automatic release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: automatic-release-main
  cancel-in-progress: false

jobs:
  prepare_release:
    name: Tag current main commit
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout triggering main commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Determine next version and tag current commit
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force
          existing_tag="$(git tag --points-at "$GITHUB_SHA" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"

          if [[ -n "$existing_tag" ]]; then
            version="${existing_tag#v}"
            tag="$existing_tag"
            echo "Reusing existing tag $tag for $GITHUB_SHA"
          else
            latest_tag="$(git tag --list 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"
            if [[ -n "$latest_tag" ]]; then
              base_version="${latest_tag#v}"
            else
              base_version="$(node -p "require('./apps/chatgpt-plus-manager/package.json').version")"
            fi
            IFS=. read -r major minor patch <<< "$base_version"
            version="$major.$minor.$((patch + 1))"
            tag="v$version"
            git tag "$tag" "$GITHUB_SHA"
            git push origin "$tag"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  create_release:
    needs: prepare_release
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Create release from tag
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ needs.prepare_release.outputs.tag }}
          generate_release_notes: true

  windows-installer:
    needs: [prepare_release, create_release]
    runs-on: windows-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_release.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set release version for build
        run: node scripts/release/set-version.mjs "${{ needs.prepare_release.outputs.version }}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install frontend dependencies
        working-directory: apps/chatgpt-plus-manager
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: apps/chatgpt-plus-manager
        run: pnpm vite:build

      - name: Build binaries
        run: cargo build --release

      - name: Stage Windows app files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/windows/app | Out-Null
          Copy-Item target/release/chatgpt-plus-plus-manager.exe dist/windows/app/

      - name: Build Windows zip asset
        shell: pwsh
        run: |
          $version = "${{ needs.prepare_release.outputs.version }}"
          New-Item -ItemType Directory -Force dist/windows | Out-Null
          Compress-Archive -Path dist/windows/app/* -DestinationPath "dist/windows/ChatGPTPlusPlus-$version-windows-x64.zip" -Force

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = "${{ needs.prepare_release.outputs.version }}"
          $makensis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) {
            $makensis = "makensis"
          }
          Push-Location scripts/installer/windows
          & $makensis "/INPUTCHARSET" "UTF8" "/DVERSION=$version" ChatGPTPlusPlus.nsi
          Pop-Location

      - name: Upload Windows installer
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ needs.prepare_release.outputs.tag }}
          files: |
            dist/windows/*.exe
            dist/windows/*.zip

  macos-dmg:
    name: macOS DMG (${{ matrix.arch }})
    needs: [prepare_release, create_release]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_release.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set release version for build
        run: node scripts/release/set-version.mjs "${{ needs.prepare_release.outputs.version }}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: apps/chatgpt-plus-manager
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: apps/chatgpt-plus-manager
        run: pnpm vite:build

      - name: Build binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build macOS DMG
        env:
          RELEASE_VERSION: ${{ needs.prepare_release.outputs.version }}
        run: |
          VERSION="$RELEASE_VERSION"
          BINARY_DIR="$PWD/target/${{ matrix.target }}/release" bash scripts/installer/macos/package-dmg.sh "$VERSION" "${{ matrix.arch }}"

      - name: Build macOS zip asset
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare_release.outputs.version }}
        run: |
          VERSION="$RELEASE_VERSION"
          (cd dist/macos/stage && zip -r "../ChatGPTPlusPlus-${VERSION}-macos-${{ matrix.arch }}.zip" "ChatGPT++.app")

      - name: Verify macOS bundle structure
        run: |
          set -euo pipefail
          test -L "dist/macos/stage/Applications"
          test "$(readlink "dist/macos/stage/Applications")" = "/Applications"
          for app in "dist/macos/stage/ChatGPT++.app"; do
            test -f "$app/Contents/Info.plist"
            test -f "$app/Contents/PkgInfo"
            test -x "$app/Contents/MacOS/$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app/Contents/Info.plist")"
            test ! -e "$app/Contents/Helpers/chatgpt-plus-plus"
            plutil -lint "$app/Contents/Info.plist" >/dev/null
            codesign -dv "$app" >/dev/null 2>&1
            echo "verified: $app"
          done

      - name: Upload macOS DMG
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ needs.prepare_release.outputs.tag }}
          files: |
            dist/macos/*.dmg
            dist/macos/*.zip

  latest-json:
    name: Upload static latest.json
    runs-on: ubuntu-latest
    needs:
      - prepare_release
      - windows-installer
      - macos-dmg
    if: ${{ always() && needs.prepare_release.result == 'success' }}
    steps:
      - name: Generate latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare_release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$TAG" --repo "$REPO" --json assets,body,tagName,url > release.json
          node <<'NODE'
          const fs = require("fs");
          const release = JSON.parse(fs.readFileSync("release.json", "utf8"));
          const repo = process.env.REPO;
          const tag = release.tagName || process.env.TAG;
          const version = tag.replace(/^v/i, "");
          const baseUrl = `https://github.com/${repo}/releases/download/${tag}`;
          const assets = (release.assets || [])
            .map((asset) => asset.name)
            .filter((name) => name !== "latest.json")
            .map((name) => ({ name, url: `${baseUrl}/${encodeURIComponent(name)}` }));
          const payload = {
            version: `v${version}`,
            url: release.url || `https://github.com/${repo}/releases/tag/${tag}`,
            body: release.body || "",
            assets
          };
          fs.writeFileSync("latest.json", `${JSON.stringify(payload, null, 2)}\n`);
          NODE
          cat latest.json

      - name: Upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare_release.outputs.tag }}
          REPO: ${{ github.repository }}
        shell: bash
        run: gh release upload "$TAG" latest.json --clobber --repo "$REPO"
